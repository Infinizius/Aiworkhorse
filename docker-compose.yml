name: ai-workhorse

services:
  db:
    # ARM64-kompatibles pgvector Image für Hetzner CAX21
    image: pgvector/pgvector:pg16
    container_name: ai-workhorse-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-workhorse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-workhorse_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-workhorse}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    # Leichtgewichtiges Alpine-Image für Token-Bucket Rate Limiting
    image: redis:7-alpine
    container_name: ai-workhorse-redis
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    # FastAPI Gehirn - läuft zwingend unter 1000:1000 für saubere Upload-Permissions
    image: python:3.11-slim
    container_name: ai-workhorse-api
    user: "1000:1000"
    working_dir: /app
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - ./backend:/app
      - ./uploads:/app/uploads
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      SERPER_API_KEY: ${SERPER_API_KEY:-}
      POSTGRES_USER: ${POSTGRES_USER:-workhorse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: db
      POSTGRES_DB: ${POSTGRES_DB:-workhorse_db}
      REACTIVE_MAX_ITERATIONS: ${REACTIVE_MAX_ITERATIONS:-3}
      GOAL_MAX_ITERATIONS: ${GOAL_MAX_ITERATIONS:-10}
      # API key for Bearer-Token authentication (must match OPENAI_API_KEY in openwebui)
      API_KEY: ${API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      WEBUI_API_KEY: ${WEBUI_API_KEY:-}
      WEBUI_INTERNAL_URL: ${WEBUI_INTERNAL_URL:-http://ai-workhorse-webui:8080}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://localhost:3002,http://localhost:3001}
      HOME: /tmp
    # Hot-Reload für Vibe-Coding
    command: bash -c "uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  openwebui:
    # Chat-UI via Open WebUI – OpenAI-kompatibler Client für das AI-Workhorse Backend
    image: ghcr.io/open-webui/open-webui:main
    container_name: ai-workhorse-webui
    environment:
      OPENAI_API_BASE_URL: http://ai-workhorse-api:8000/v1
      # Must match API_KEY in the api service – Open WebUI sends this as the Bearer token
      OPENAI_API_KEY: ${API_KEY:-workhorse-local}
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY:-change-me-in-production}
      ENABLE_SIGNUP: "true"
      DEFAULT_MODELS: gemini-3-flash-preview
    volumes:
      - openwebui_data:/app/backend/data
    ports:
      - "3002:8080"
    depends_on:
      - api
    restart: unless-stopped

  caddy:
    # Reverse Proxy mit automatischem HTTPS via Let's Encrypt
    # Wird nur im Produktionsbetrieb (--profile prod) gestartet.
    # Voraussetzung: DOMAIN in .env gesetzt, DNS-A-Eintrag zeigt auf VPS-IP,
    #                Port 80+443 in der Hetzner-Firewall freigegeben.
    image: caddy:2-alpine
    container_name: ai-workhorse-caddy
    profiles: ["prod"]
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"    # HTTP/3 (QUIC)
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN:?DOMAIN must be set in .env for production (e.g. chat.example.com)}
    depends_on:
      - openwebui
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  openwebui_data:
  caddy_data:
  caddy_config:
